services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://cache:6379/1
    volumes:
      - ./backend:/app          # mount local backend code into container
    command: >
      sh -c "echo '=== Running makemigrations ===' &&
             python manage.py makemigrations &&
             echo '=== Running migrate ===' &&
             python manage.py migrate &&
             echo '=== Starting server ===' &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app         # mount local frontend code into container
      - /app/node_modules       # keep node_modules from the image, don't overwrite with host
    depends_on:
      - backend

  db:
    image: postgres:15
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
