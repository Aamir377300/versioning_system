services:
  - type: web
    name: docversioning-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      # ↓ Replace with your actual frontend URL after first deploy
      - key: CORS_ALLOWED_ORIGINS
        value: "https://versioning-system-xi.vercel.app"
      # Admin seed credentials (used by seed.py)
      - key: ADMIN_EMAIL
        value: "devansh.dv137@gmail.com"
      - key: ADMIN_PASSWORD
        value: "123"
      - key: ADMIN_USERNAME
        value: "renderAdmin"
      # Database — auto-filled from the linked Render PostgreSQL
      - key: POSTGRES_DB
        fromDatabase:
          name: docversioning-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: docversioning-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: docversioning-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: docversioning-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: docversioning-db
          property: port
      - key: DATABASE_URL
        fromDatabase:
          name: docversioning-db
          property: connectionString
      - key: REDIS_URL
        value: ""   # Leave empty if not using Redis on free tier

databases:
  - name: docversioning-db
    plan: free
    databaseName: versioning_system
    user: postgres



